<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>주식 투자 트래커</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f9f9f9; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo } = React;
    const fmt = (n) => Number(n).toLocaleString("ko-KR");
    const pct = (n) => (n >= 0 ? "+" : "") + n.toFixed(2) + "%";
    const profitColor = (n) => n > 0 ? "#1D9E75" : n < 0 ? "#E24B4A" : "#888780";
    const CARD_COLORS = [
      { bg: "#E6F1FB", border: "#378ADD", accent: "#185FA5", text: "#0C447C" },
      { bg: "#E1F5EE", border: "#1D9E75", accent: "#0F6E56", text: "#085041" },
      { bg: "#FAEEDA", border: "#BA7517", accent: "#854F0B", text: "#633806" },
      { bg: "#EEEDFE", border: "#7F77DD", accent: "#534AB7", text: "#3C3489" },
      { bg: "#FBEAF0", border: "#D4537E", accent: "#993556", text: "#72243E" },
      { bg: "#EAF3DE", border: "#639922", accent: "#3B6D11", text: "#27500A" },
    ];
    const emptyForm = { name: "", qty: "", buyDate: "", buyPrice: "", sellDate: "", sellPrice: "" };

    function App() {
      const [stocks, setStocks] = useState([
        { id: 1, name: "삼성전자", qty: 10, buyDate: "2024-01-15", buyPrice: 72000, sellDate: "2024-06-20", sellPrice: 82000 },
        { id: 2, name: "카카오", qty: 5, buyDate: "2024-03-01", buyPrice: 48000, sellDate: "", sellPrice: "" },
        { id: 3, name: "NAVER", qty: 3, buyDate: "2024-02-10", buyPrice: 195000, sellDate: "2024-08-05", sellPrice: 175000 },
      ]);
      const [form, setForm] = useState(emptyForm);
      const [editId, setEditId] = useState(null);
      const [showForm, setShowForm] = useState(false);
      const [tab, setTab] = useState("all");

      const calc = (s) => {
        const invest = s.qty * s.buyPrice;
        const sold = s.sellDate && s.sellPrice ? s.qty * Number(s.sellPrice) : null;
        const pnl = sold !== null ? sold - invest : null;
        const rate = pnl !== null ? (pnl / invest) * 100 : null;
        return { invest, pnl, rate };
      };

      const summary = useMemo(() => {
        let totalInvest = 0, realizedPnl = 0;
        stocks.forEach(s => {
          const { invest, pnl } = calc(s);
          totalInvest += invest;
          if (pnl !== null) realizedPnl += pnl;
        });
        const overallRate = totalInvest > 0 ? (realizedPnl / totalInvest) * 100 : 0;
        return { totalInvest, realizedPnl, overallRate, count: stocks.length };
      }, [stocks]);

      const filtered = stocks.filter(s =>
        tab === "holding" ? !s.sellDate : tab === "sold" ? !!s.sellDate : true
      );

      const handleSubmit = () => {
        if (!form.name || !form.qty || !form.buyDate || !form.buyPrice) return;
        const entry = { ...form, qty: Number(form.qty), buyPrice: Number(form.buyPrice), sellPrice: form.sellPrice ? Number(form.sellPrice) : "" };
        if (editId !== null) {
          setStocks(stocks.map(s => s.id === editId ? { ...s, ...entry } : s));
          setEditId(null);
        } else {
          setStocks([...stocks, { id: Date.now(), ...entry }]);
        }
        setForm(emptyForm); setShowForm(false);
      };

      const handleEdit = (s) => {
        setForm({ name: s.name, qty: s.qty, buyDate: s.buyDate, buyPrice: s.buyPrice, sellDate: s.sellDate || "", sellPrice: s.sellPrice || "" });
        setEditId(s.id); setShowForm(true);
      };

      return (
        <div style={{ padding: "1.5rem 1rem", maxWidth: 700, margin: "0 auto" }}>
          <div style={{ borderBottom: "2px solid #378ADD", paddingBottom: 12, marginBottom: "1.5rem", display: "flex", alignItems: "center", gap: 10 }}>
            <div style={{ width: 10, height: 32, borderRadius: 4, background: "linear-gradient(180deg,#378ADD,#1D9E75)" }} />
            <h2 style={{ fontSize: 20, fontWeight: 500, margin: 0 }}>주식 투자 트래커</h2>
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 10, marginBottom: "1.5rem" }}>
            {[
              { label: "총 종목 수", value: summary.count + "개", bg: "#E6F1FB", border: "#378ADD", vColor: "#185FA5" },
              { label: "총 투자금액", value: "₩" + fmt(summary.totalInvest), bg: "#EEEDFE", border: "#7F77DD", vColor: "#534AB7" },
              { label: "실현 손익", value: (summary.realizedPnl >= 0 ? "+" : "") + "₩" + fmt(Math.abs(Math.round(summary.realizedPnl))), sub: pct(summary.overallRate), bg: summary.realizedPnl >= 0 ? "#E1F5EE" : "#FCEBEB", border: summary.realizedPnl >= 0 ? "#1D9E75" : "#E24B4A", vColor: profitColor(summary.realizedPnl) },
            ].map((m, i) => (
              <div key={i} style={{ background: m.bg, borderRadius: 10, padding: "12px 14px", border: "1px solid " + m.border, borderLeftWidth: 4 }}>
                <div style={{ fontSize: 11, color: "#888", marginBottom: 4 }}>{m.label}</div>
                <div style={{ fontSize: 15, fontWeight: 500, color: m.vColor }}>{m.value}</div>
                {m.sub && <div style={{ fontSize: 12, color: m.vColor, marginTop: 2 }}>{m.sub}</div>}
              </div>
            ))}
          </div>

          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "1rem", borderBottom: "1px solid #eee", paddingBottom: 10 }}>
            <div style={{ display: "flex", gap: 4 }}>
              {[["all","전체"], ["holding","보유중"], ["sold","매도완료"]].map(([v, l]) => (
                <button key={v} onClick={() => setTab(v)} style={{ padding: "5px 14px", borderRadius: 20, border: tab === v ? "1.5px solid #378ADD" : "1px solid #ddd", background: tab === v ? "#E6F1FB" : "transparent", color: tab === v ? "#185FA5" : "#888", fontSize: 13, cursor: "pointer" }}>{l}</button>
              ))}
            </div>
            <button onClick={() => { setForm(emptyForm); setEditId(null); setShowForm(!showForm); }} style={{ padding: "6px 14px", borderRadius: 8, border: "1.5px solid #378ADD", background: showForm ? "#378ADD" : "#E6F1FB", color: showForm ? "#fff" : "#185FA5", fontSize: 13, cursor: "pointer" }}>
              {showForm ? "닫기" : "+ 종목 추가"}
            </button>
          </div>

          {showForm && (
            <div style={{ background: "#EEEDFE", border: "1px solid #AFA9EC", borderRadius: 12, padding: "1rem 1.25rem", marginBottom: "1rem" }}>
              <div style={{ fontWeight: 500, fontSize: 14, marginBottom: 12, color: "#3C3489", borderBottom: "1px solid #AFA9EC", paddingBottom: 8 }}>{editId ? "종목 수정" : "새 종목 추가"}</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 12 }}>
                {[["종목명","name","text","예: 삼성전자"],["매수 수량(주)","qty","number","10"],["매수 날짜","buyDate","date",""],["매수 단가(₩)","buyPrice","number","70000"],["매도 날짜(선택)","sellDate","date",""],["매도 단가(₩,선택)","sellPrice","number","80000"]].map(([label,key,type,ph]) => (
                  <div key={key}>
                    <div style={{ fontSize: 12, color: "#888", marginBottom: 4 }}>{label}</div>
                    <input type={type} placeholder={ph} value={form[key]} onChange={e => setForm({...form, [key]: e.target.value})} style={{ padding: "7px 10px", borderRadius: 8, border: "1px solid #ccc", fontSize: 14, width: "100%" }} />
                  </div>
                ))}
              </div>
              <button onClick={handleSubmit} style={{ padding: "7px 20px", borderRadius: 8, border: "none", background: "#534AB7", color: "#fff", fontSize: 13, cursor: "pointer" }}>{editId ? "수정 완료" : "추가하기"}</button>
            </div>
          )}

          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {filtered.map((s, idx) => {
              const { invest, pnl, rate } = calc(s);
              const hasSell = !!s.sellDate && !!s.sellPrice;
              const clr = CARD_COLORS[idx % CARD_COLORS.length];
              return (
                <div key={s.id} style={{ background: clr.bg, border: "1px solid " + clr.border, borderLeft: "5px solid " + clr.border, borderRadius: 12, padding: "14px 16px" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                      <div style={{ width: 40, height: 40, borderRadius: 10, background: clr.accent, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: 500, color: "#fff" }}>{s.name.slice(0,2)}</div>
                      <div>
                        <div style={{ fontWeight: 500, fontSize: 15, color: clr.text }}>{s.name}</div>
                        <div style={{ fontSize: 12, color: clr.accent, marginTop: 2 }}>{s.qty}주 · 매수 {s.buyDate}{hasSell ? " · 매도 " + s.sellDate : ""}</div>
                      </div>
                    </div>
                    <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                      <span style={{ fontSize: 11, padding: "3px 10px", borderRadius: 20, background: hasSell ? "#D3D1C7" : clr.accent, color: hasSell ? "#444" : "#fff" }}>{hasSell ? "매도완료" : "보유중"}</span>
                      <button onClick={() => handleEdit(s)} style={{ background: "none", border: "1px solid " + clr.border, borderRadius: 6, cursor: "pointer", color: clr.accent, fontSize: 12, padding: "2px 8px" }}>수정</button>
                      <button onClick={() => setStocks(stocks.filter(x => x.id !== s.id))} style={{ background: "none", border: "1px solid #E24B4A", borderRadius: 6, cursor: "pointer", color: "#E24B4A", fontSize: 12, padding: "2px 8px" }}>삭제</button>
                    </div>
                  </div>
                  <div style={{ borderTop: "1px dashed " + clr.border, margin: "12px 0" }} />
                  <div style={{ display: "grid", gridTemplateColumns: hasSell ? "repeat(4,1fr)" : "repeat(3,1fr)", gap: 8 }}>
                    {[
                      { label: "매수 단가", value: "₩" + fmt(s.buyPrice) },
                      { label: "총 투자금액", value: "₩" + fmt(invest) },
                      ...(hasSell ? [
                        { label: "매도 단가", value: "₩" + fmt(s.sellPrice) },
                        { label: "손익", value: (pnl >= 0 ? "+" : "") + "₩" + fmt(Math.round(Math.abs(pnl))), sub: pct(rate), pnl }
                      ] : [{ label: "상태", value: "보유중" }])
                    ].map((m, i) => (
                      <div key={i} style={{ background: "rgba(255,255,255,0.6)", borderRadius: 8, padding: "8px 10px", border: "1px solid " + clr.border }}>
                        <div style={{ fontSize: 11, color: clr.accent, marginBottom: 3 }}>{m.label}</div>
                        <div style={{ fontSize: 13, fontWeight: 500, color: m.pnl !== undefined ? profitColor(m.pnl) : clr.text }}>{m.value}</div>
                        {m.sub && <div style={{ fontSize: 11, color: profitColor(m.pnl), marginTop: 2 }}>{m.sub}</div>}
                      </div>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
