<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>주식 투자 트래커</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F5F4F0;
      --surface: #FFFFFF;
      --surface2: #F0EFEb;
      --border: rgba(0,0,0,0.08);
      --border2: rgba(0,0,0,0.14);
      --text: #1A1917;
      --text2: #6B6960;
      --text3: #9B9A96;
      --blue: #185FA5;
      --blue-bg: #E6F1FB;
      --blue-text: #0C447C;
      --green: #1D9E75;
      --green-bg: #E1F5EE;
      --green-text: #085041;
      --red: #E24B4A;
      --red-bg: #FCEBEB;
      --red-text: #791F1F;
      --amber-bg: #FAEEDA;
      --amber-text: #633806;
      --amber-border: rgba(186,117,23,0.3);
      --radius: 10px;
      --radius-lg: 14px;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── Layout ── */
    .app { max-width: 900px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }

    /* ── Header ── */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 2rem; padding-bottom: 1.25rem;
      border-bottom: 1px solid var(--border);
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .logo-mark {
      width: 34px; height: 34px; border-radius: 9px;
      background: var(--blue); display: flex; align-items: center; justify-content: center;
    }
    .logo-mark svg { width: 18px; height: 18px; fill: none; stroke: #fff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .header h1 { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
    .header-actions { display: flex; gap: 8px; flex-wrap: wrap; }

    /* ── Buttons ── */
    .btn {
      font-size: 13px; font-weight: 500; padding: 7px 14px;
      border-radius: var(--radius); border: 1px solid var(--border2);
      background: var(--surface); color: var(--text);
      cursor: pointer; transition: all 0.15s; white-space: nowrap;
      font-family: inherit;
    }
    .btn:hover { background: var(--surface2); }
    .btn-primary { background: var(--blue); color: #fff; border-color: var(--blue); }
    .btn-primary:hover { background: #0C447C; border-color: #0C447C; }
    .btn-csv { background: var(--green-bg); color: var(--green-text); border-color: rgba(29,158,117,0.25); }
    .btn-csv:hover { background: #c8ede3; }

    /* ── Summary Cards ── */
    .summary-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px; margin-bottom: 1.25rem;
    }
    .metric-card {
      background: var(--surface); border-radius: var(--radius-lg);
      border: 1px solid var(--border); padding: 1rem 1.125rem;
      box-shadow: var(--shadow);
    }
    .metric-label { font-size: 11px; color: var(--text3); margin-bottom: 5px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
    .metric-value { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; color: var(--text); }
    .metric-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
    .pos { color: var(--green); }
    .neg { color: var(--red); }

    /* ── Alert Banner ── */
    .alert-banner {
      background: var(--amber-bg); border: 1px solid var(--amber-border);
      border-radius: var(--radius-lg); padding: .875rem 1.125rem;
      margin-bottom: 1.25rem;
    }
    .alert-title { font-size: 12px; font-weight: 600; color: var(--amber-text); margin-bottom: 6px; }
    .alert-item { font-size: 12px; color: var(--text); display: flex; align-items: flex-start; gap: 6px; margin-bottom: 3px; }
    .alert-item.danger { color: var(--red-text); }
    .alert-item.target { color: var(--green-text); }

    /* ── Two column panel ── */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1.25rem; }
    @media(max-width: 640px) { .two-col { grid-template-columns: 1fr; } }

    .panel {
      background: var(--surface); border-radius: var(--radius-lg);
      border: 1px solid var(--border); padding: 1rem 1.125rem;
      box-shadow: var(--shadow);
    }
    .panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: .875rem; }
    .panel-title { font-size: 13px; font-weight: 600; color: var(--text); }
    .risk-badge {
      font-size: 11px; padding: 3px 10px; border-radius: 99px;
      font-weight: 600; letter-spacing: 0.3px;
    }
    .risk-low { background: var(--green-bg); color: var(--green-text); }
    .risk-mid { background: var(--amber-bg); color: var(--amber-text); }
    .risk-high { background: var(--red-bg); color: var(--red-text); }

    .risk-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: .875rem; }
    .risk-item { background: var(--surface2); border-radius: var(--radius); padding: .625rem .75rem; }
    .risk-item-label { font-size: 10px; color: var(--text3); margin-bottom: 3px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.4px; }
    .risk-item-value { font-size: 16px; font-weight: 600; color: var(--text); letter-spacing: -0.3px; }
    .risk-item-sub { font-size: 10px; color: var(--text3); margin-top: 2px; }

    .bar-section-label { font-size: 10px; color: var(--text3); margin-bottom: 5px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.4px; }
    .bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
    .bar-label { width: 70px; font-size: 11px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bar-track { flex: 1; height: 5px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 3px; transition: width .4s ease; }
    .bar-pct { width: 34px; text-align: right; font-size: 11px; font-weight: 600; color: var(--text); }

    .legend { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text2); }
    .legend-dot { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }

    /* ── Filter + List ── */
    .filter-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
    .filter-tabs { display: flex; gap: 5px; }
    .tab {
      font-size: 12px; font-weight: 500; padding: 5px 13px;
      border-radius: 99px; border: 1px solid var(--border);
      background: transparent; color: var(--text2); cursor: pointer; transition: all 0.15s;
      font-family: inherit;
    }
    .tab:hover { background: var(--surface); }
    .tab.active { background: var(--text); color: #fff; border-color: var(--text); }

    .stock-list { display: flex; flex-direction: column; gap: 10px; }

    /* ── Stock Card ── */
    .stock-card {
      background: var(--surface); border-radius: var(--radius-lg);
      border: 1px solid var(--border); box-shadow: var(--shadow);
      overflow: hidden; transition: border-color .2s;
    }
    .stock-card:hover { border-color: var(--border2); }
    .stock-card.holding { border-left: 3px solid var(--green); }
    .stock-card.sold { border-left: 3px solid var(--text3); }

    .card-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: .875rem 1.125rem .75rem; flex-wrap: wrap; gap: 8px;
    }
    .card-left { display: flex; align-items: center; gap: 10px; }
    .avatar {
      width: 38px; height: 38px; border-radius: 10px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; letter-spacing: -0.3px;
    }
    .stock-name { font-size: 15px; font-weight: 600; letter-spacing: -0.2px; }
    .stock-meta { font-size: 11px; color: var(--text3); margin-top: 2px; }

    .card-actions { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .status-badge {
      font-size: 11px; padding: 3px 10px; border-radius: 99px; font-weight: 600;
    }
    .holding-badge { background: var(--green-bg); color: var(--green-text); }
    .sold-badge { background: var(--surface2); color: var(--text2); }
    .alert-pill {
      font-size: 10px; padding: 2px 8px; border-radius: 99px; font-weight: 600;
    }
    .alert-pill.target { background: var(--green-bg); color: var(--green-text); }
    .alert-pill.stop { background: var(--red-bg); color: var(--red-text); }

    .action-btn {
      font-size: 12px; padding: 4px 10px; border-radius: var(--radius);
      border: 1px solid var(--border); background: transparent; color: var(--text2);
      cursor: pointer; transition: all .15s; font-family: inherit;
    }
    .action-btn:hover { background: var(--surface2); }
    .action-btn.del { color: var(--red-text); border-color: rgba(226,75,74,0.2); }
    .action-btn.del:hover { background: var(--red-bg); }

    .card-body {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
      gap: 1px; background: var(--border); border-top: 1px solid var(--border);
    }
    .card-field { background: var(--surface); padding: .625rem 1rem; }
    .field-label { font-size: 10px; color: var(--text3); margin-bottom: 3px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.4px; }
    .field-value { font-size: 14px; font-weight: 600; color: var(--text); letter-spacing: -0.2px; }

    /* ── Memo Section ── */
    .memo-section {
      padding: .75rem 1.125rem; border-top: 1px solid var(--border);
      background: var(--surface2);
    }
    .memo-tabs { display: flex; gap: 4px; margin-bottom: .625rem; }
    .memo-tab {
      font-size: 11px; font-weight: 500; padding: 3px 10px;
      border-radius: 99px; border: 1px solid var(--border);
      background: transparent; color: var(--text2); cursor: pointer; font-family: inherit;
    }
    .memo-tab.active { background: var(--surface); color: var(--text); border-color: var(--border2); }
    .memo-content { display: none; }
    .memo-content.visible { display: block; }
    .memo-text { font-size: 12px; color: var(--text); line-height: 1.65; }
    .memo-sub { font-size: 11px; color: var(--text3); margin-top: 3px; }
    .memo-empty { font-size: 12px; color: var(--text3); font-style: italic; }
    .memo-risk-grid { display: flex; flex-wrap: wrap; gap: 14px; }
    .memo-risk-item { }
    .memo-risk-label { font-size: 10px; color: var(--text3); margin-bottom: 2px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.4px; }
    .memo-risk-value { font-size: 14px; font-weight: 600; }
    .weight-bar { height: 3px; background: var(--border); border-radius: 2px; margin-top: 4px; width: 80px; overflow: hidden; }
    .weight-fill { height: 100%; background: var(--blue); border-radius: 2px; }

    /* ── Modal ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      z-index: 100; align-items: flex-start; justify-content: center;
      padding: 2rem 1rem; overflow-y: auto;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface); border-radius: var(--radius-lg);
      border: 1px solid var(--border); width: 100%; max-width: 480px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15); margin: auto;
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 1.25rem; border-bottom: 1px solid var(--border);
    }
    .modal-title { font-size: 15px; font-weight: 600; }
    .modal-close {
      background: transparent; border: none; cursor: pointer; color: var(--text3);
      font-size: 20px; padding: 2px 4px; line-height: 1; font-family: inherit;
    }
    .modal-close:hover { color: var(--text); }
    .modal-body { padding: 1.25rem; max-height: 65vh; overflow-y: auto; }
    .form-group { margin-bottom: .875rem; }
    .form-label { font-size: 11px; font-weight: 600; color: var(--text2); margin-bottom: 5px; display: block; text-transform: uppercase; letter-spacing: 0.4px; }
    .form-input {
      width: 100%; font-size: 13px; padding: 8px 10px;
      border-radius: var(--radius); border: 1px solid var(--border2);
      background: var(--bg); color: var(--text); font-family: inherit;
      transition: border-color .15s;
    }
    .form-input:focus { outline: none; border-color: var(--blue); background: var(--surface); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .form-divider {
      font-size: 11px; font-weight: 600; color: var(--text3);
      margin: 1rem 0 .625rem; padding-top: 1rem;
      border-top: 1px solid var(--border); text-transform: uppercase; letter-spacing: 0.5px;
    }
    .modal-footer {
      display: flex; justify-content: flex-end; gap: 8px;
      padding: .875rem 1.25rem; border-top: 1px solid var(--border);
    }
    .sentiment-wrap { display: flex; gap: 8px; padding-top: 5px; }
    .sentiment-btn {
      font-size: 20px; padding: 2px 5px; border: 1px solid transparent;
      border-radius: var(--radius); cursor: pointer; background: transparent;
      opacity: .35; transition: all .15s;
    }
    .sentiment-btn.active { opacity: 1; border-color: var(--border2); background: var(--surface); }

    /* ── Empty ── */
    .empty { text-align: center; padding: 3rem 1rem; color: var(--text3); }
    .empty-icon { font-size: 36px; margin-bottom: 10px; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-left">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
      </div>
      <h1>주식 투자 트래커</h1>
    </div>
    <div class="header-actions">
      <button class="btn btn-csv" onclick="exportCSV()">↓ CSV 내보내기</button>
      <button class="btn btn-primary" onclick="openModal()">+ 종목 추가</button>
    </div>
  </div>

  <div class="summary-grid" id="summaryGrid"></div>
  <div id="alertBanner"></div>

  <div class="two-col">
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">리스크 지표</span>
        <span class="risk-badge" id="riskBadge">—</span>
      </div>
      <div class="risk-grid" id="riskGrid"></div>
      <div class="bar-section-label">종목별 비중</div>
      <div id="barWrap"></div>
    </div>
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">섹터별 비중</span>
      </div>
      <div class="legend" id="pieLegend"></div>
      <div style="position:relative;width:100%;height:190px">
        <canvas id="pieChart" role="img" aria-label="섹터별 포트폴리오 비중 도넛 차트">섹터별 포트폴리오 비중</canvas>
      </div>
    </div>
  </div>

  <div class="filter-row">
    <div class="filter-tabs">
      <button class="tab active" onclick="setFilter('all',this)">전체</button>
      <button class="tab" onclick="setFilter('holding',this)">보유중</button>
      <button class="tab" onclick="setFilter('sold',this)">매도완료</button>
    </div>
  </div>

  <div class="stock-list" id="stockList"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">종목 추가</span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">종목명 *</label>
          <input class="form-input" id="f_name" placeholder="삼성전자">
        </div>
        <div class="form-group">
          <label class="form-label">업종 *</label>
          <select class="form-input" id="f_sector">
            <option>반도체</option><option>IT/플랫폼</option>
            <option>바이오/헬스케어</option><option>제약</option>
            <option>금융</option><option>에너지</option>
            <option>소비재</option><option>산업재</option><option>기타</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">주수 *</label>
          <input class="form-input" id="f_qty" type="number" placeholder="10">
        </div>
        <div class="form-group">
          <label class="form-label">매수 단가 (₩) *</label>
          <input class="form-input" id="f_buy" type="number" placeholder="72000">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">매수일 *</label>
          <input class="form-input" id="f_buydate" type="date">
        </div>
        <div class="form-group">
          <label class="form-label">현재가 (₩)</label>
          <input class="form-input" id="f_current" type="number" placeholder="경보 기준가">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">목표가 (₩)</label>
          <input class="form-input" id="f_target" type="number" placeholder="90000">
        </div>
        <div class="form-group">
          <label class="form-label">손절가 (₩)</label>
          <input class="form-input" id="f_stop" type="number" placeholder="65000">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">매도 단가 (₩)</label>
          <input class="form-input" id="f_sell" type="number" placeholder="매도 완료 시">
        </div>
        <div class="form-group">
          <label class="form-label">매도일</label>
          <input class="form-input" id="f_selldate" type="date">
        </div>
      </div>

      <div class="form-divider">📝 투자 메모</div>
      <div class="form-group">
        <label class="form-label">매수 이유 / 투자 thesis</label>
        <textarea class="form-input" id="f_reason" rows="3" placeholder="이 종목을 선택한 근거"></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">참고 뉴스/공시</label>
          <input class="form-input" id="f_news" placeholder="2Q 실적 개선 기대">
        </div>
        <div class="form-group">
          <label class="form-label">매수 당시 심리</label>
          <div class="sentiment-wrap" id="f_sentiment_wrap">
            <button type="button" class="sentiment-btn" data-v="😤" onclick="setSentiment(this)">😤</button>
            <button type="button" class="sentiment-btn active" data-v="😐" onclick="setSentiment(this)">😐</button>
            <button type="button" class="sentiment-btn" data-v="😊" onclick="setSentiment(this)">😊</button>
            <button type="button" class="sentiment-btn" data-v="🤩" onclick="setSentiment(this)">🤩</button>
          </div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">반성 메모 (매도 후)</label>
        <textarea class="form-input" id="f_review" rows="2" placeholder="잘된 점, 아쉬운 점"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" onclick="saveStock()">저장</button>
    </div>
  </div>
</div>

<script>
const AVATAR_COLORS = [
  {bg:'#E6F1FB',text:'#0C447C'},{bg:'#E1F5EE',text:'#085041'},
  {bg:'#FAEEDA',text:'#633806'},{bg:'#FCEBEB',text:'#791F1F'},
  {bg:'#EEEDFE',text:'#3C3489'},{bg:'#FBEAF0',text:'#72243E'},
  {bg:'#EAF3DE',text:'#27500A'},{bg:'#FAECE7',text:'#712B13'},
];
const SECTOR_COLORS = {
  '반도체':'#185FA5','IT/플랫폼':'#1D9E75','바이오/헬스케어':'#D4537E',
  '제약':'#7F77DD','금융':'#BA7517','에너지':'#D85A30',
  '소비재':'#639922','산업재':'#888780','기타':'#B4B2A9'
};

let stocks = [], editIdx = null, filter = 'all', selectedSentiment = '😐', pieChart = null;

function load() {
  try { stocks = JSON.parse(localStorage.getItem('stocks_v3') || '[]'); } catch { stocks = []; }
}
function save() { localStorage.setItem('stocks_v3', JSON.stringify(stocks)); }
function fmt(n) { return n == null ? '—' : '₩' + Math.round(n).toLocaleString(); }
function fmtPct(n) { return n == null ? '—' : (n >= 0 ? '+' : '') + n.toFixed(2) + '%'; }

function calcProfit(s) {
  if (s.sell != null) {
    return { gain: (s.sell - s.buy) * s.qty, pct: (s.sell - s.buy) / s.buy * 100 };
  }
  if (s.current) {
    return { gain: (s.current - s.buy) * s.qty, pct: (s.current - s.buy) / s.buy * 100 };
  }
  return { gain: null, pct: null };
}

function totalInvested() { return stocks.reduce((a, s) => a + s.buy * s.qty, 0); }
function realizedPnl() { return stocks.filter(s => s.sell != null).reduce((a, s) => a + (s.sell - s.buy) * s.qty, 0); }
function winRate() {
  const sold = stocks.filter(s => s.sell != null);
  if (!sold.length) return 0;
  return Math.round(sold.filter(s => s.sell > s.buy).length / sold.length * 100);
}

function renderSummary() {
  const total = totalInvested(), pnl = realizedPnl(), pnlPct = total ? pnl / total * 100 : 0;
  const holding = stocks.filter(s => s.sell == null).length;
  document.getElementById('summaryGrid').innerHTML = `
    <div class="metric-card">
      <div class="metric-label">총 종목 수</div>
      <div class="metric-value">${stocks.length}<span style="font-size:14px;font-weight:400;color:var(--text3)">개</span></div>
      <div class="metric-sub">보유 ${holding} · 매도 ${stocks.length - holding}</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">총 투자금액</div>
      <div class="metric-value" style="font-size:18px">${fmt(total)}</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">실현 손익</div>
      <div class="metric-value ${pnl >= 0 ? 'pos' : 'neg'}" style="font-size:18px">${pnl >= 0 ? '+' : ''}${fmt(pnl)}</div>
      <div class="metric-sub">${fmtPct(pnlPct)}</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">승률</div>
      <div class="metric-value">${winRate()}<span style="font-size:14px;font-weight:400;color:var(--text3)">%</span></div>
      <div class="metric-sub">${stocks.filter(s => s.sell != null).length}건 거래</div>
    </div>
  `;
}

function renderAlerts() {
  const holding = stocks.filter(s => s.sell == null);
  const alerts = [];
  holding.forEach(s => {
    if (!s.current) return;
    if (s.target && s.current >= s.target)
      alerts.push({ type: 'target', msg: `${s.name} — 목표가 도달! 현재가 ${fmt(s.current)} ≥ 목표가 ${fmt(s.target)}` });
    else if (s.target && s.current >= s.target * 0.95)
      alerts.push({ type: 'target', msg: `${s.name} — 목표가 95% 근접 (현재 ${fmt(s.current)})` });
    if (s.stop && s.current <= s.stop)
      alerts.push({ type: 'danger', msg: `${s.name} — 손절가 도달! 현재가 ${fmt(s.current)} ≤ 손절가 ${fmt(s.stop)}` });
    else if (s.stop && s.current <= s.stop * 1.05)
      alerts.push({ type: 'danger', msg: `${s.name} — 손절가 5% 근접 (현재 ${fmt(s.current)})` });
  });
  const el = document.getElementById('alertBanner');
  if (!alerts.length) { el.innerHTML = ''; return; }
  el.innerHTML = `<div class="alert-banner">
    <div class="alert-title">🔔 가격 경보 ${alerts.length}건</div>
    ${alerts.map(a => `<div class="alert-item ${a.type}">${a.type === 'danger' ? '⚠️' : '🎯'} ${a.msg}</div>`).join('')}
  </div>`;
}

function renderRisk() {
  const total = totalInvested();
  if (!total) {
    document.getElementById('riskGrid').innerHTML = '<div style="font-size:12px;color:var(--text3);grid-column:span 2">종목을 추가하면 리스크 지표가 표시됩니다</div>';
    document.getElementById('barWrap').innerHTML = '';
    document.getElementById('riskBadge').textContent = '—';
    document.getElementById('riskBadge').className = 'risk-badge';
    return;
  }
  const weights = stocks.map(s => s.buy * s.qty / total * 100);
  const maxW = Math.max(...weights);
  const hhi = Math.round(weights.reduce((a, w) => a + (w / 100) ** 2, 0) * 10000);
  const sectorMap = {};
  stocks.forEach((s, i) => { sectorMap[s.sector] = (sectorMap[s.sector] || 0) + weights[i]; });
  const maxSector = Math.max(...Object.values(sectorMap));
  const maxSectorName = Object.keys(sectorMap).find(k => sectorMap[k] === maxSector) || '';
  const holdingStop = stocks.filter(s => s.sell == null && s.stop);
  const maxLoss = holdingStop.reduce((a, s) => a + (s.buy - s.stop) * s.qty, 0);
  const topName = stocks[weights.indexOf(maxW)]?.name || '';
  let riskLevel, riskClass;
  if (maxW > 50 || maxSector > 60) { riskLevel = '높음'; riskClass = 'risk-high'; }
  else if (maxW > 30 || maxSector > 40) { riskLevel = '중간'; riskClass = 'risk-mid'; }
  else { riskLevel = '낮음'; riskClass = 'risk-low'; }
  document.getElementById('riskBadge').className = 'risk-badge ' + riskClass;
  document.getElementById('riskBadge').textContent = riskLevel;
  document.getElementById('riskGrid').innerHTML = `
    <div class="risk-item"><div class="risk-item-label">최대 종목 비중</div><div class="risk-item-value">${maxW.toFixed(1)}%</div><div class="risk-item-sub">${topName}</div></div>
    <div class="risk-item"><div class="risk-item-label">HHI 집중도</div><div class="risk-item-value">${hhi}</div><div class="risk-item-sub">2500↓ 권장</div></div>
    <div class="risk-item"><div class="risk-item-label">최대 섹터 비중</div><div class="risk-item-value">${maxSector.toFixed(1)}%</div><div class="risk-item-sub">${maxSectorName}</div></div>
    <div class="risk-item"><div class="risk-item-label">잠재 최대 손실</div><div class="risk-item-value neg" style="font-size:14px">${maxLoss > 0 ? '-' + fmt(maxLoss) : '—'}</div><div class="risk-item-sub">손절가 기준</div></div>
  `;
  const sorted = [...stocks].sort((a, b) => b.buy * b.qty - a.buy * a.qty);
  document.getElementById('barWrap').innerHTML = sorted.map(s => {
    const w = s.buy * s.qty / total * 100;
    return `<div class="bar-row">
      <div class="bar-label">${s.name}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${w.toFixed(1)}%;background:${SECTOR_COLORS[s.sector] || '#888'}"></div></div>
      <div class="bar-pct">${w.toFixed(1)}%</div>
    </div>`;
  }).join('');
}

function renderPie() {
  const total = totalInvested();
  const pieLegend = document.getElementById('pieLegend');
  if (!total) { pieLegend.innerHTML = ''; return; }
  const sectorMap = {};
  stocks.forEach(s => { sectorMap[s.sector] = (sectorMap[s.sector] || 0) + s.buy * s.qty; });
  const labels = Object.keys(sectorMap);
  const data = labels.map(k => sectorMap[k]);
  const colors = labels.map(k => SECTOR_COLORS[k] || '#888');
  pieLegend.innerHTML = labels.map((l, i) =>
    `<span class="legend-item"><span class="legend-dot" style="background:${colors[i]}"></span>${l} ${(data[i] / total * 100).toFixed(1)}%</span>`
  ).join('');
  if (pieChart) pieChart.destroy();
  pieChart = new Chart(document.getElementById('pieChart'), {
    type: 'doughnut',
    data: { labels, datasets: [{ data, backgroundColor: colors, borderWidth: 2, borderColor: '#fff' }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => `${ctx.label}: ${(ctx.parsed / total * 100).toFixed(1)}%` } }
      },
      cutout: '58%'
    }
  });
}

function renderList() {
  const filtered = filter === 'all' ? stocks
    : filter === 'holding' ? stocks.filter(s => s.sell == null)
    : stocks.filter(s => s.sell != null);
  const total = totalInvested();
  const container = document.getElementById('stockList');
  if (!filtered.length) {
    container.innerHTML = '<div class="empty"><div class="empty-icon">📭</div>종목이 없습니다.<br><span style="font-size:12px">위 버튼으로 첫 종목을 추가해보세요.</span></div>';
    return;
  }
  container.innerHTML = filtered.map(s => {
    const idx = stocks.indexOf(s);
    const av = AVATAR_COLORS[idx % AVATAR_COLORS.length];
    const isSold = s.sell != null;
    const { gain, pct } = calcProfit(s);
    const weight = total ? s.buy * s.qty / total * 100 : 0;
    let alertPills = '';
    if (!isSold && s.current) {
      if (s.target && s.current >= s.target * 0.95) alertPills += `<span class="alert-pill target">🎯 목표가 근접</span>`;
      if (s.stop && s.current <= s.stop * 1.05) alertPills += `<span class="alert-pill stop">⚠️ 손절가 근접</span>`;
    }
    const priceFields = isSold ? `
      <div class="card-field"><div class="field-label">매수 단가</div><div class="field-value">${fmt(s.buy)}</div></div>
      <div class="card-field"><div class="field-label">총 투자금</div><div class="field-value">${fmt(s.buy * s.qty)}</div></div>
      <div class="card-field"><div class="field-label">매도 단가</div><div class="field-value">${fmt(s.sell)}</div></div>
      <div class="card-field"><div class="field-label">손익</div><div class="field-value ${gain >= 0 ? 'pos' : 'neg'}">${gain >= 0 ? '+' : ''}${fmt(gain)}<br><small>${fmtPct(pct)}</small></div></div>
    ` : `
      <div class="card-field"><div class="field-label">매수 단가</div><div class="field-value">${fmt(s.buy)}</div></div>
      <div class="card-field"><div class="field-label">현재가</div><div class="field-value">${s.current ? fmt(s.current) : '—'}</div></div>
      <div class="card-field"><div class="field-label">목표가</div><div class="field-value pos">${fmt(s.target)}</div></div>
      <div class="card-field"><div class="field-label">손절가</div><div class="field-value neg">${fmt(s.stop)}</div></div>
    `;
    return `<div class="stock-card ${isSold ? 'sold' : 'holding'}">
      <div class="card-header">
        <div class="card-left">
          <div class="avatar" style="background:${av.bg};color:${av.text}">${s.name.slice(0,2)}</div>
          <div>
            <div class="stock-name">${s.name}</div>
            <div class="stock-meta">${s.qty}주 · ${s.buydate} · <span style="color:${SECTOR_COLORS[s.sector]||'#888'}">${s.sector}</span></div>
          </div>
        </div>
        <div class="card-actions">
          <span class="status-badge ${isSold ? 'sold-badge' : 'holding-badge'}">${isSold ? '매도완료' : '보유중'}</span>
          ${alertPills}
          <button class="action-btn" onclick="openModal(${idx})">수정</button>
          <button class="action-btn del" onclick="deleteStock(${idx})">삭제</button>
        </div>
      </div>
      <div class="card-body">${priceFields}</div>
      <div class="memo-section">
        <div class="memo-tabs">
          <button class="memo-tab active" onclick="switchTab(this,'reason','mt${idx}')">매수근거</button>
          <button class="memo-tab" onclick="switchTab(this,'risk','mt${idx}')">리스크</button>
          ${isSold ? `<button class="memo-tab" onclick="switchTab(this,'review','mt${idx}')">반성</button>` : ''}
        </div>
        <div id="mt${idx}_reason" class="memo-content visible">
          ${s.reason ? `<div class="memo-text">${s.reason}</div>` : '<div class="memo-empty">매수 근거를 입력해두세요</div>'}
          ${s.news ? `<div class="memo-sub">📰 ${s.news}</div>` : ''}
          ${s.sentiment ? `<div class="memo-sub" style="margin-top:4px">${s.sentiment} 매수 당시 심리</div>` : ''}
        </div>
        <div id="mt${idx}_risk" class="memo-content">
          <div class="memo-risk-grid">
            <div class="memo-risk-item">
              <div class="memo-risk-label">포트폴리오 비중</div>
              <div class="memo-risk-value">${weight.toFixed(1)}%</div>
              <div class="weight-bar"><div class="weight-fill" style="width:${Math.min(weight * 2, 100)}%"></div></div>
            </div>
            ${s.target && s.buy ? `<div class="memo-risk-item"><div class="memo-risk-label">목표 수익률</div><div class="memo-risk-value pos">+${((s.target - s.buy) / s.buy * 100).toFixed(1)}%</div></div>` : ''}
            ${s.stop && s.buy ? `<div class="memo-risk-item"><div class="memo-risk-label">최대 손실</div><div class="memo-risk-value neg">${((s.stop - s.buy) / s.buy * 100).toFixed(1)}%</div></div>` : ''}
            ${s.stop && s.target ? `<div class="memo-risk-item"><div class="memo-risk-label">리스크/리워드</div><div class="memo-risk-value">${Math.abs((s.target - s.buy) / (s.stop - s.buy)).toFixed(1)}R</div></div>` : ''}
          </div>
        </div>
        ${isSold ? `<div id="mt${idx}_review" class="memo-content">${s.review ? `<div class="memo-text">${s.review}</div>` : '<div class="memo-empty">반성 메모를 입력해두세요</div>'}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

function switchTab(btn, key, prefix) {
  btn.closest('.memo-section').querySelectorAll('.memo-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  btn.closest('.memo-section').querySelectorAll('.memo-content').forEach(c => c.classList.remove('visible'));
  document.getElementById(prefix + '_' + key)?.classList.add('visible');
}

function setFilter(f, btn) {
  filter = f;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function setSentiment(btn) {
  document.querySelectorAll('#f_sentiment_wrap .sentiment-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedSentiment = btn.dataset.v;
}

function openModal(idx = null) {
  editIdx = idx;
  document.getElementById('modalTitle').textContent = idx != null ? '종목 수정' : '종목 추가';
  const fields = ['name','qty','buy','buydate','current','target','stop','sell','selldate','reason','news','review'];
  if (idx != null) {
    const s = stocks[idx];
    document.getElementById('f_name').value = s.name || '';
    document.getElementById('f_sector').value = s.sector || '기타';
    fields.filter(f => f !== 'name').forEach(f => {
      const el = document.getElementById('f_' + f);
      if (el) el.value = s[f] || '';
    });
    selectedSentiment = s.sentiment || '😐';
  } else {
    document.getElementById('f_name').value = '';
    document.getElementById('f_sector').value = '반도체';
    fields.filter(f => f !== 'name').forEach(f => {
      const el = document.getElementById('f_' + f);
      if (el) el.value = '';
    });
    selectedSentiment = '😐';
  }
  document.querySelectorAll('#f_sentiment_wrap .sentiment-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.v === selectedSentiment);
  });
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

function saveStock() {
  const name = document.getElementById('f_name').value.trim();
  const qty = parseFloat(document.getElementById('f_qty').value);
  const buy = parseFloat(document.getElementById('f_buy').value);
  const buydate = document.getElementById('f_buydate').value;
  if (!name || !qty || !buy || !buydate) { alert('종목명, 주수, 매수 단가, 매수일은 필수입니다'); return; }
  const stock = {
    id: editIdx != null ? stocks[editIdx].id : Date.now(),
    name, sector: document.getElementById('f_sector').value, qty, buy, buydate,
    current: parseFloat(document.getElementById('f_current').value) || null,
    target: parseFloat(document.getElementById('f_target').value) || null,
    stop: parseFloat(document.getElementById('f_stop').value) || null,
    sell: parseFloat(document.getElementById('f_sell').value) || null,
    selldate: document.getElementById('f_selldate').value || null,
    reason: document.getElementById('f_reason').value.trim(),
    news: document.getElementById('f_news').value.trim(),
    review: document.getElementById('f_review').value.trim(),
    sentiment: selectedSentiment,
  };
  if (editIdx != null) stocks[editIdx] = stock; else stocks.push(stock);
  save(); closeModal(); render();
}

function deleteStock(idx) {
  if (confirm('삭제하시겠습니까?')) { stocks.splice(idx, 1); save(); render(); }
}

function exportCSV() {
  const headers = ['종목명','업종','주수','매수단가','총투자금','매수일','현재가','목표가','손절가','매도단가','매도일','매수이유','참고뉴스','심리','반성메모','손익','수익률(%)'];
  const rows = stocks.map(s => {
    const { gain, pct } = calcProfit(s);
    return [
      s.name, s.sector, s.qty, s.buy, s.buy * s.qty, s.buydate,
      s.current || '', s.target || '', s.stop || '',
      s.sell || '', s.selldate || '',
      `"${(s.reason || '').replace(/"/g, '""')}"`,
      `"${(s.news || '').replace(/"/g, '""')}"`,
      s.sentiment || '',
      `"${(s.review || '').replace(/"/g, '""')}"`,
      gain != null ? Math.round(gain) : '',
      pct != null ? pct.toFixed(2) : '',
    ].join(',');
  });
  const csv = '\uFEFF' + [headers.join(','), ...rows].join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
  a.download = '주식트래커_' + new Date().toISOString().slice(0, 10) + '.csv';
  a.click();
}

function render() { renderSummary(); renderAlerts(); renderRisk(); renderPie(); renderList(); }
load();
render();
</script>
