<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>주식 투자 트래커</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --color-background-primary: #ffffff;
      --color-background-secondary: #f5f5f3;
      --color-background-tertiary: #eeede9;
      --color-background-warning: #faeeda;
      --color-text-primary: #1a1917;
      --color-text-secondary: #6b6960;
      --color-text-success: #085041;
      --color-text-danger: #791f1f;
      --color-text-warning: #633806;
      --color-border-tertiary: rgba(0,0,0,0.08);
      --color-border-secondary: rgba(0,0,0,0.14);
      --color-border-primary: rgba(0,0,0,0.25);
      --color-border-danger: rgba(226,75,74,0.3);
      --color-border-warning: rgba(186,117,23,0.3);
      --border-radius-md: 8px;
      --border-radius-lg: 12px;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    body { font-family: var(--font-sans); background: var(--color-background-tertiary); color: var(--color-text-primary); font-size: 14px; min-height: 100vh; }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
    .app{max-width:860px;margin:0 auto;padding:1.5rem 1rem}
    .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:0.5px solid var(--color-border-tertiary)}
    .header h1{font-size:20px;font-weight:500;color:var(--color-text-primary)}
    .header-actions{display:flex;gap:8px;flex-wrap:wrap}
    .btn{font-size:13px;padding:6px 14px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer;font-family:var(--font-sans)}
    .btn:hover{background:var(--color-background-secondary)}
    .btn-primary{background:#185FA5;color:#E6F1FB;border-color:#185FA5}
    .btn-primary:hover{background:#0C447C}
    .btn-success{background:#0F6E56;color:#E1F5EE;border-color:#0F6E56}
    .btn-success:hover{background:#085041}
    .btn-refresh{background:#EEEDFE;color:#3C3489;border-color:rgba(127,119,221,0.3);font-size:12px;padding:5px 11px}
    .btn-refresh:hover{background:#CECBF6}
    .btn-refresh:disabled{opacity:0.5;cursor:not-allowed}
    .summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:1.25rem}
    .metric-card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:.875rem 1rem}
    .metric-label{font-size:12px;color:var(--color-text-secondary);margin-bottom:6px}
    .metric-value{font-size:20px;font-weight:500;color:var(--color-text-primary)}
    .metric-sub{font-size:11px;color:var(--color-text-secondary);margin-top:2px}
    .metric-value.pos{color:var(--color-text-success)}
    .metric-value.neg{color:var(--color-text-danger)}
    .alert-banner{border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-warning);background:var(--color-background-warning);padding:.75rem 1.25rem;margin-bottom:1.25rem}
    .alert-title{font-size:13px;font-weight:500;color:var(--color-text-warning);margin-bottom:6px}
    .alert-items{display:flex;flex-direction:column;gap:4px}
    .alert-item{font-size:12px;display:flex;align-items:center;gap:8px;color:var(--color-text-primary)}
    .alert-item.danger{color:var(--color-text-danger)}
    .alert-item.target{color:var(--color-text-success)}
    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.25rem}
    @media(max-width:600px){.two-col{grid-template-columns:1fr}}
    .panel{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem 1.25rem}
    .panel-title{font-size:14px;font-weight:500;color:var(--color-text-primary);margin-bottom:.875rem}
    .risk-badge{font-size:11px;padding:3px 10px;border-radius:var(--border-radius-md);font-weight:500;float:right}
    .risk-low{background:#EAF3DE;color:#3B6D11}
    .risk-mid{background:#FAEEDA;color:#854F0B}
    .risk-high{background:#FCEBEB;color:#A32D2D}
    .risk-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:.875rem}
    .risk-item{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:.625rem .75rem}
    .risk-item-label{font-size:11px;color:var(--color-text-secondary);margin-bottom:3px}
    .risk-item-value{font-size:15px;font-weight:500;color:var(--color-text-primary)}
    .risk-item-sub{font-size:10px;color:var(--color-text-secondary);margin-top:1px}
    .bar-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;font-size:11px}
    .bar-label{width:64px;color:var(--color-text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .bar-track{flex:1;height:5px;background:var(--color-background-secondary);border-radius:3px;overflow:hidden}
    .bar-fill{height:100%;border-radius:3px}
    .bar-pct{width:32px;text-align:right;color:var(--color-text-primary);font-weight:500}
    .legend{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px}
    .legend-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--color-text-secondary)}
    .legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
    .filter-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
    .filter-tabs{display:flex;gap:6px}
    .tab{font-size:13px;padding:5px 14px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);background:transparent;color:var(--color-text-secondary);cursor:pointer;font-family:var(--font-sans)}
    .tab.active{background:var(--color-background-primary);border-color:var(--color-border-primary);color:var(--color-text-primary);font-weight:500}
    .stock-list{display:flex;flex-direction:column;gap:10px}
    .stock-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden}
    .stock-card.holding{border-left:3px solid #1D9E75}
    .stock-card.sold{border-left:3px solid #888780}
    .card-header{display:flex;align-items:center;justify-content:space-between;padding:.875rem 1.25rem .75rem;flex-wrap:wrap;gap:8px}
    .card-left{display:flex;align-items:center;gap:10px}
    .avatar{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;flex-shrink:0}
    .stock-name{font-size:15px;font-weight:500;color:var(--color-text-primary)}
    .stock-meta{font-size:12px;color:var(--color-text-secondary);margin-top:2px}
    .card-actions{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
    .status-badge{font-size:11px;padding:3px 10px;border-radius:var(--border-radius-md);font-weight:500}
    .holding-badge{background:#E1F5EE;color:#0F6E56}
    .sold-badge{background:#F1EFE8;color:#5F5E5A}
    .alert-pill{font-size:11px;padding:2px 8px;border-radius:var(--border-radius-md);font-weight:500}
    .alert-pill.target{background:#EAF3DE;color:#27500A}
    .alert-pill.stop{background:#FCEBEB;color:#791F1F}
    .action-btn{font-size:12px;padding:4px 10px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);cursor:pointer;font-family:var(--font-sans)}
    .action-btn:hover{background:var(--color-background-secondary)}
    .action-btn.del{color:var(--color-text-danger);border-color:var(--color-border-danger)}
    .card-body{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:1px;background:var(--color-border-tertiary);border-top:0.5px solid var(--color-border-tertiary)}
    .card-field{background:var(--color-background-primary);padding:.625rem 1rem}
    .field-label{font-size:11px;color:var(--color-text-secondary);margin-bottom:3px}
    .field-value{font-size:14px;font-weight:500;color:var(--color-text-primary)}
    .field-value.pos{color:var(--color-text-success)}
    .field-value.neg{color:var(--color-text-danger)}
    .price-row{display:flex;align-items:center;gap:6px}
    .price-update-time{font-size:10px;color:var(--color-text-secondary);margin-top:2px}
    .memo-section{padding:.75rem 1.25rem;border-top:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary)}
    .memo-tabs{display:flex;gap:4px;margin-bottom:.625rem}
    .memo-tab{font-size:11px;padding:3px 10px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);background:transparent;color:var(--color-text-secondary);cursor:pointer;font-family:var(--font-sans)}
    .memo-tab.active{background:var(--color-background-primary);color:var(--color-text-primary);border-color:var(--color-border-secondary)}
    .memo-content{display:none}
    .memo-content.visible{display:block}
    .weight-bar{height:4px;background:var(--color-background-primary);border-radius:2px;margin-top:4px;overflow:hidden}
    .weight-fill{height:100%;background:#185FA5;border-radius:2px}
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);align-items:flex-start;justify-content:center;z-index:100;padding:1.5rem 1rem;overflow-y:auto}
    .modal-overlay.open{display:flex}
    .modal{background:var(--color-background-primary);border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);width:100%;max-width:480px;margin:auto}
    .modal-header{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.25rem;border-bottom:0.5px solid var(--color-border-tertiary)}
    .modal-title{font-size:16px;font-weight:500;color:var(--color-text-primary)}
    .modal-close{background:transparent;border:none;font-size:18px;cursor:pointer;color:var(--color-text-secondary);padding:2px 6px;font-family:var(--font-sans)}
    .modal-body{padding:1.25rem;max-height:65vh;overflow-y:auto}
    .form-group{margin-bottom:1rem}
    .form-label{font-size:12px;color:var(--color-text-secondary);margin-bottom:5px;display:block}
    .form-hint{font-size:11px;color:var(--color-text-secondary);margin-top:3px}
    .form-input{width:100%;font-size:13px;padding:7px 10px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);font-family:var(--font-sans)}
    .form-input:focus{outline:none;border-color:var(--color-border-primary)}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .form-section{font-size:12px;font-weight:500;color:var(--color-text-secondary);margin:.875rem 0 .5rem;padding-top:.875rem;border-top:0.5px solid var(--color-border-tertiary)}
    .modal-footer{display:flex;justify-content:flex-end;gap:8px;padding:1rem 1.25rem;border-top:0.5px solid var(--color-border-tertiary)}
    .empty{text-align:center;padding:3rem 1rem;color:var(--color-text-secondary);font-size:14px}
    .sentiment-btn{font-size:18px;padding:2px 6px;border:0.5px solid transparent;border-radius:var(--border-radius-md);cursor:pointer;background:transparent;opacity:.4;transition:all .15s}
    .sentiment-btn.active{opacity:1;border-color:var(--color-border-secondary);background:var(--color-background-primary)}
    .ticker-badge{font-size:10px;padding:2px 7px;border-radius:var(--border-radius-md);background:#EEEDFE;color:#3C3489;font-weight:500;margin-left:4px}
    .spin{animation:spin .8s linear infinite;display:inline-block}
    @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    .delay-notice{font-size:11px;color:var(--color-text-secondary);padding:.5rem .75rem;background:var(--color-background-secondary);border-radius:var(--border-radius-md);margin-bottom:1rem;display:flex;align-items:center;gap:6px}
  </style>
</head>
<body>
<h2 class="sr-only">주식 투자 트래커 v4 — 야후 파이낸스 주가 연동</h2>
<div class="app">
  <div class="header">
    <h1><i class="ti ti-chart-candle" style="font-size:20px;vertical-align:-3px;margin-right:6px"></i>주식 투자 트래커</h1>
    <div class="header-actions">
      <button class="btn btn-refresh" onclick="refreshAllPrices()" id="refreshAllBtn"><i class="ti ti-refresh" style="font-size:13px;vertical-align:-2px;margin-right:4px"></i>전체 주가 갱신</button>
      <button class="btn btn-success" onclick="exportCSV()"><i class="ti ti-download" style="font-size:13px;vertical-align:-2px;margin-right:4px"></i>CSV 내보내기</button>
      <button class="btn btn-primary" onclick="openModal()"><i class="ti ti-plus" style="font-size:13px;vertical-align:-2px;margin-right:4px"></i>종목 추가</button>
    </div>
  </div>

  <div class="delay-notice">
    <i class="ti ti-info-circle" style="font-size:13px;flex-shrink:0"></i>
    야후 파이낸스 연동 — 15~20분 지연 시세입니다. 투자 판단은 반드시 본인 책임 하에 하시기 바랍니다.
  </div>

  <div class="summary-grid" id="summaryGrid"></div>
  <div id="alertBanner"></div>

  <div class="two-col">
    <div class="panel">
      <div class="panel-title"><i class="ti ti-shield-half" style="font-size:14px;vertical-align:-2px;margin-right:5px"></i>리스크 지표 <span class="risk-badge" id="riskBadge">—</span></div>
      <div class="risk-grid" id="riskGrid"></div>
      <div id="barWrap"></div>
    </div>
    <div class="panel">
      <div class="panel-title"><i class="ti ti-chart-pie" style="font-size:14px;vertical-align:-2px;margin-right:5px"></i>섹터별 비중</div>
      <div id="pieLegend" class="legend"></div>
      <div style="position:relative;width:100%;height:200px">
        <canvas id="pieChart" role="img" aria-label="섹터별 비중">섹터별 비중</canvas>
      </div>
    </div>
  </div>

  <div class="filter-row">
    <div class="filter-tabs">
      <button class="tab active" onclick="setFilter('all',this)">전체</button>
      <button class="tab" onclick="setFilter('holding',this)">보유중</button>
      <button class="tab" onclick="setFilter('sold',this)">매도완료</button>
    </div>
  </div>
  <div class="stock-list" id="stockList"></div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">종목 추가</span>
      <button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">종목명 *</label>
          <input class="form-input" id="f_name" placeholder="삼성전자">
        </div>
        <div class="form-group">
          <label class="form-label">업종 *</label>
          <select class="form-input" id="f_sector">
            <option>반도체</option><option>IT/플랫폼</option><option>바이오/헬스케어</option>
            <option>제약</option><option>금융</option><option>에너지</option>
            <option>소비재</option><option>산업재</option><option>기타</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">종목 코드 (야후 파이낸스용)</label>
        <input class="form-input" id="f_ticker" placeholder="예) 005930 (삼성전자), 035420 (NAVER)">
        <div class="form-hint">
          <i class="ti ti-info-circle" style="font-size:11px;vertical-align:-1px"></i>
          국내주식: 6자리 숫자 (005930) / 미국주식: 영문 티커 (AAPL, TSLA)
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">주수 *</label><input class="form-input" id="f_qty" type="number" placeholder="10"></div>
        <div class="form-group"><label class="form-label">매수 단가 (₩) *</label><input class="form-input" id="f_buy" type="number" placeholder="72000"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">매수일 *</label><input class="form-input" id="f_buydate" type="date"></div>
        <div class="form-group"><label class="form-label">현재가 (₩) — 자동갱신 or 수동</label><input class="form-input" id="f_current" type="number" placeholder="주가 갱신 버튼 사용"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">목표가 (₩)</label><input class="form-input" id="f_target" type="number" placeholder="90000"></div>
        <div class="form-group"><label class="form-label">손절가 (₩)</label><input class="form-input" id="f_stop" type="number" placeholder="65000"></div>
      </div>
      <div class="form-group"><label class="form-label">매도 단가 (₩)</label><input class="form-input" id="f_sell" type="number" placeholder="매도 완료 시 입력"></div>
      <div class="form-group"><label class="form-label">매도일</label><input class="form-input" id="f_selldate" type="date"></div>
      <div class="form-section"><i class="ti ti-note" style="font-size:12px;vertical-align:-1px;margin-right:4px"></i>투자 메모</div>
      <div class="form-group"><label class="form-label">매수 이유 / 투자 thesis</label><textarea class="form-input" id="f_reason" style="height:56px;resize:none" placeholder="이 종목을 선택한 근거"></textarea></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">참고 뉴스/공시</label><input class="form-input" id="f_news" placeholder="2Q 실적 개선 기대"></div>
        <div class="form-group"><label class="form-label">매수 당시 심리</label>
          <div style="display:flex;gap:8px;padding-top:6px" id="f_sentiment_wrap">
            <button type="button" class="sentiment-btn" data-v="😤" onclick="setSentiment(this)">😤</button>
            <button type="button" class="sentiment-btn active" data-v="😐" onclick="setSentiment(this)">😐</button>
            <button type="button" class="sentiment-btn" data-v="😊" onclick="setSentiment(this)">😊</button>
            <button type="button" class="sentiment-btn" data-v="🤩" onclick="setSentiment(this)">🤩</button>
          </div>
        </div>
      </div>
      <div class="form-group"><label class="form-label">반성 메모 (매도 후)</label><textarea class="form-input" id="f_review" style="height:46px;resize:none" placeholder="잘된 점, 아쉬운 점"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" onclick="saveStock()">저장</button>
    </div>
  </div>
</div>

<script>
const COLORS=[{bg:'#E6F1FB',text:'#0C447C'},{bg:'#E1F5EE',text:'#085041'},{bg:'#FAEEDA',text:'#633806'},{bg:'#FCEBEB',text:'#791F1F'},{bg:'#EEEDFE',text:'#3C3489'},{bg:'#FBEAF0',text:'#72243E'},{bg:'#EAF3DE',text:'#27500A'},{bg:'#FAECE7',text:'#712B13'}];
const SECTOR_COLORS={'반도체':'#185FA5','IT/플랫폼':'#1D9E75','바이오/헬스케어':'#D4537E','제약':'#7F77DD','금융':'#BA7517','에너지':'#D85A30','소비재':'#639922','산업재':'#888780','기타':'#B4B2A9'};
let stocks=[],editIdx=null,filter='all',selectedSentiment='😐',pieChartInstance=null;

function load(){try{stocks=JSON.parse(localStorage.getItem('stocks_v4')||'[]');}catch{stocks=[];}}
function save(){localStorage.setItem('stocks_v4',JSON.stringify(stocks));}
function fmt(n){return n==null?'—':'₩'+Math.round(n).toLocaleString();}
function fmtPct(n){return n==null?'—':(n>=0?'+':'')+n.toFixed(2)+'%';}
function calcProfit(s){
  if(s.sell!=null){const g=(s.sell-s.buy)*s.qty,p=(s.sell-s.buy)/s.buy*100;return{gain:g,pct:p};}
  if(s.current){const g=(s.current-s.buy)*s.qty,p=(s.current-s.buy)/s.buy*100;return{gain:g,pct:p};}
  return{gain:null,pct:null};
}
function totalInvested(){return stocks.reduce((a,s)=>a+s.buy*s.qty,0);}
function realizedPnl(){return stocks.filter(s=>s.sell!=null).reduce((a,s)=>a+(s.sell-s.buy)*s.qty,0);}
function winRate(){const sold=stocks.filter(s=>s.sell!=null);if(!sold.length)return 0;return Math.round(sold.filter(s=>s.sell>s.buy).length/sold.length*100);}

// ── 야후 파이낸스 주가 조회 ──
async function fetchPrice(ticker){
  if(!ticker)return null;
  const symbol=(/^\d{6}$/.test(ticker))?ticker+'.KS':ticker.toUpperCase();
  const target=`https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=1d`;
  const proxy=`https://api.allorigins.win/get?url=${encodeURIComponent(target)}`;
  try{
    const res=await fetch(proxy);
    if(!res.ok)return null;
    const wrapper=await res.json();
    const data=JSON.parse(wrapper.contents);
    return data?.chart?.result?.[0]?.meta?.regularMarketPrice||null;
  }catch{return null;}
}

async function refreshPrice(idx){
  const s=stocks[idx];
  if(!s||!s.ticker)return;
  const btn=document.getElementById('refreshBtn_'+idx);
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spin"><i class="ti ti-refresh" style="font-size:12px"></i></span>';}
  const price=await fetchPrice(s.ticker);
  if(price){
    stocks[idx].current=Math.round(price);
    stocks[idx].priceUpdated=new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
    save();render();
  } else {
    if(btn){btn.disabled=false;btn.innerHTML='<i class="ti ti-refresh" style="font-size:12px"></i>';}
    alert(`${s.name} 주가를 불러오지 못했습니다.\n종목코드(${s.ticker})를 확인해주세요.`);
  }
}

async function refreshAllPrices(){
  const holding=stocks.filter(s=>s.sell==null&&s.ticker);
  if(!holding.length){alert('종목 코드가 입력된 보유 종목이 없습니다.');return;}
  const btn=document.getElementById('refreshAllBtn');
  btn.disabled=true;
  btn.innerHTML='<span class="spin"><i class="ti ti-refresh" style="font-size:13px;vertical-align:-2px"></i></span> 갱신 중...';
  for(const s of holding){
    const idx=stocks.indexOf(s);
    const price=await fetchPrice(s.ticker);
    if(price){
      stocks[idx].current=Math.round(price);
      stocks[idx].priceUpdated=new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
    }
    await new Promise(r=>setTimeout(r,300));
  }
  save();render();
  btn.disabled=false;
  btn.innerHTML='<i class="ti ti-refresh" style="font-size:13px;vertical-align:-2px;margin-right:4px"></i>전체 주가 갱신';
}

function renderSummary(){
  const total=totalInvested(),pnl=realizedPnl(),pnlPct=total?pnl/total*100:0,holding=stocks.filter(s=>s.sell==null).length;
  document.getElementById('summaryGrid').innerHTML=`
    <div class="metric-card"><div class="metric-label">총 종목 수</div><div class="metric-value">${stocks.length}개</div><div class="metric-sub">보유 ${holding} · 매도 ${stocks.length-holding}</div></div>
    <div class="metric-card"><div class="metric-label">총 투자금액</div><div class="metric-value" style="font-size:17px">${fmt(total)}</div></div>
    <div class="metric-card"><div class="metric-label">실현 손익</div><div class="metric-value ${pnl>=0?'pos':'neg'}" style="font-size:17px">${pnl>=0?'+':''}${fmt(pnl)}</div><div class="metric-sub">${fmtPct(pnlPct)}</div></div>
    <div class="metric-card"><div class="metric-label">승률</div><div class="metric-value">${winRate()}%</div><div class="metric-sub">${stocks.filter(s=>s.sell!=null).length}건 거래</div></div>
  `;
}

function renderAlerts(){
  const alerts=[];
  stocks.filter(s=>s.sell==null).forEach(s=>{
    if(!s.current)return;
    if(s.target&&s.current>=s.target)alerts.push({type:'target',msg:`${s.name} — 목표가 도달! 현재가 ${fmt(s.current)} ≥ 목표가 ${fmt(s.target)}`});
    else if(s.target&&s.current>=s.target*0.95)alerts.push({type:'target',msg:`${s.name} — 목표가 95% 근접 (현재 ${fmt(s.current)})`});
    if(s.stop&&s.current<=s.stop)alerts.push({type:'danger',msg:`${s.name} — 손절가 도달! 현재가 ${fmt(s.current)} ≤ 손절가 ${fmt(s.stop)}`});
    else if(s.stop&&s.current<=s.stop*1.05)alerts.push({type:'danger',msg:`${s.name} — 손절가 5% 근접 (현재 ${fmt(s.current)})`});
  });
  const el=document.getElementById('alertBanner');
  if(!alerts.length){el.innerHTML='';return;}
  el.innerHTML=`<div class="alert-banner"><div class="alert-title"><i class="ti ti-bell" style="font-size:13px;vertical-align:-1px;margin-right:5px"></i>가격 경보 (${alerts.length}건)</div><div class="alert-items">${alerts.map(a=>`<div class="alert-item ${a.type}"><i class="ti ${a.type==='danger'?'ti-alert-triangle':'ti-target'}" style="font-size:13px;flex-shrink:0"></i>${a.msg}</div>`).join('')}</div></div>`;
}

function renderRisk(){
  const total=totalInvested();
  if(!total){document.getElementById('riskGrid').innerHTML='<div style="font-size:13px;color:var(--color-text-secondary);grid-column:span 2">종목을 추가하면 지표가 표시됩니다</div>';document.getElementById('barWrap').innerHTML='';return;}
  const weights=stocks.map(s=>s.buy*s.qty/total*100),maxW=Math.max(...weights),hhi=Math.round(weights.reduce((a,w)=>a+(w/100)**2,0)*10000),sectorMap={};
  stocks.forEach((s,i)=>{sectorMap[s.sector]=(sectorMap[s.sector]||0)+weights[i];});
  const maxSector=Math.max(...Object.values(sectorMap)),maxSectorName=Object.keys(sectorMap).find(k=>sectorMap[k]===maxSector)||'',maxLoss=stocks.filter(s=>s.sell==null&&s.stop).reduce((a,s)=>a+(s.buy-s.stop)*s.qty,0);
  let riskLevel,riskClass;
  if(maxW>50||maxSector>60){riskLevel='높음';riskClass='risk-high';}
  else if(maxW>30||maxSector>40){riskLevel='중간';riskClass='risk-mid';}
  else{riskLevel='낮음';riskClass='risk-low';}
  document.getElementById('riskBadge').className='risk-badge '+riskClass;
  document.getElementById('riskBadge').textContent=riskLevel;
  const topName=stocks[weights.indexOf(maxW)]?.name||'';
  document.getElementById('riskGrid').innerHTML=`
    <div class="risk-item"><div class="risk-item-label">최대 종목 비중</div><div class="risk-item-value">${maxW.toFixed(1)}%</div><div class="risk-item-sub">${topName}</div></div>
    <div class="risk-item"><div class="risk-item-label">HHI 집중도</div><div class="risk-item-value">${hhi}</div><div class="risk-item-sub">2500↓ 권장</div></div>
    <div class="risk-item"><div class="risk-item-label">최대 섹터 비중</div><div class="risk-item-value">${maxSector.toFixed(1)}%</div><div class="risk-item-sub">${maxSectorName}</div></div>
    <div class="risk-item"><div class="risk-item-label">잠재 최대 손실</div><div class="risk-item-value" style="color:var(--color-text-danger)">${maxLoss>0?'-'+fmt(maxLoss):'—'}</div><div class="risk-item-sub">손절가 기준</div></div>
  `;
  const sorted=[...stocks].sort((a,b)=>b.buy*b.qty-a.buy*a.qty);
  document.getElementById('barWrap').innerHTML='<div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:5px;font-weight:500">종목별 비중</div>'+
    sorted.map(s=>{const w=s.buy*s.qty/total*100;return`<div class="bar-row"><div class="bar-label">${s.name}</div><div class="bar-track"><div class="bar-fill" style="width:${w.toFixed(1)}%;background:${SECTOR_COLORS[s.sector]||'#888'}"></div></div><div class="bar-pct">${w.toFixed(1)}%</div></div>`;}).join('');
}

function renderPie(){
  const total=totalInvested();
  if(!total){document.getElementById('pieLegend').innerHTML='';return;}
  const sectorMap={};
  stocks.forEach(s=>{sectorMap[s.sector]=(sectorMap[s.sector]||0)+s.buy*s.qty;});
  const labels=Object.keys(sectorMap),data=labels.map(k=>sectorMap[k]),colors=labels.map(k=>SECTOR_COLORS[k]||'#888780');
  document.getElementById('pieLegend').innerHTML=labels.map((l,i)=>`<span class="legend-item"><span class="legend-dot" style="background:${colors[i]}"></span>${l} ${(data[i]/total*100).toFixed(1)}%</span>`).join('');
  if(pieChartInstance)pieChartInstance.destroy();
  pieChartInstance=new Chart(document.getElementById('pieChart'),{type:'doughnut',data:{labels,datasets:[{data,backgroundColor:colors,borderWidth:2,borderColor:'#ffffff'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:(ctx)=>`${ctx.label}: ${(ctx.parsed/total*100).toFixed(1)}%`}}},cutout:'55%'}});
}

function renderList(){
  const filtered=filter==='all'?stocks:filter==='holding'?stocks.filter(s=>s.sell==null):stocks.filter(s=>s.sell!=null);
  const total=totalInvested(),container=document.getElementById('stockList');
  if(!filtered.length){container.innerHTML='<div class="empty"><i class="ti ti-mood-empty" style="font-size:32px;display:block;margin-bottom:8px"></i>종목이 없습니다</div>';return;}
  container.innerHTML=filtered.map(s=>{
    const idx=stocks.indexOf(s),av=COLORS[idx%COLORS.length],isSold=s.sell!=null;
    const{gain,pct}=calcProfit(s),weight=total?s.buy*s.qty/total*100:0;
    let alertPills='';
    if(!isSold&&s.current){
      if(s.target&&s.current>=s.target*0.95)alertPills+=`<span class="alert-pill target"><i class="ti ti-target" style="font-size:11px;vertical-align:-1px"></i> 목표가 근접</span>`;
      if(s.stop&&s.current<=s.stop*1.05)alertPills+=`<span class="alert-pill stop"><i class="ti ti-alert-triangle" style="font-size:11px;vertical-align:-1px"></i> 손절가 근접</span>`;
    }
    const tickerBadge=s.ticker?`<span class="ticker-badge">${s.ticker}</span>`:'';
    const refreshBtn=(!isSold&&s.ticker)?`<button class="action-btn btn-refresh" id="refreshBtn_${idx}" onclick="refreshPrice(${idx})" title="주가 갱신"><i class="ti ti-refresh" style="font-size:12px"></i></button>`:'';
    const currentField=isSold?'':`
      <div class="card-field">
        <div class="field-label">현재가</div>
        <div class="price-row">
          <div class="field-value ${gain!=null?(gain>=0?'pos':'neg'):''}">${s.current?fmt(s.current):'—'}</div>
        </div>
        ${s.priceUpdated?`<div class="price-update-time">갱신 ${s.priceUpdated}</div>`:''}
      </div>`;
    const priceFields=isSold?`
      <div class="card-field"><div class="field-label">매수 단가</div><div class="field-value">${fmt(s.buy)}</div></div>
      <div class="card-field"><div class="field-label">총 투자금</div><div class="field-value">${fmt(s.buy*s.qty)}</div></div>
      <div class="card-field"><div class="field-label">매도 단가</div><div class="field-value">${fmt(s.sell)}</div></div>
      <div class="card-field"><div class="field-label">손익</div><div class="field-value ${gain>=0?'pos':'neg'}">${gain>=0?'+':''}${fmt(gain)}<br><span style="font-size:11px">${fmtPct(pct)}</span></div></div>
    `:`
      <div class="card-field"><div class="field-label">매수 단가</div><div class="field-value">${fmt(s.buy)}</div></div>
      ${currentField}
      <div class="card-field"><div class="field-label">평가손익</div><div class="field-value ${gain!=null?(gain>=0?'pos':'neg'):''}">${gain!=null?(gain>=0?'+':'')+fmt(gain):'—'}<br><span style="font-size:11px">${fmtPct(pct)}</span></div></div>
      <div class="card-field"><div class="field-label">목표가 / 손절가</div><div class="field-value"><span style="color:var(--color-text-success)">${fmt(s.target)}</span> <span style="color:var(--color-text-secondary);font-size:11px">/</span> <span style="color:var(--color-text-danger)">${fmt(s.stop)}</span></div></div>
    `;
    return `<div class="stock-card ${isSold?'sold':'holding'}">
      <div class="card-header">
        <div class="card-left">
          <div class="avatar" style="background:${av.bg};color:${av.text}">${s.name.slice(0,2)}</div>
          <div>
            <div class="stock-name">${s.name}${tickerBadge}</div>
            <div class="stock-meta">${s.qty}주 · ${s.buydate} · <span style="color:${SECTOR_COLORS[s.sector]||'#888'}">${s.sector}</span></div>
          </div>
        </div>
        <div class="card-actions">
          <span class="status-badge ${isSold?'sold-badge':'holding-badge'}">${isSold?'매도완료':'보유중'}</span>
          ${alertPills}
          ${refreshBtn}
          <button class="action-btn" onclick="openModal(${idx})"><i class="ti ti-edit" style="font-size:12px"></i> 수정</button>
          <button class="action-btn del" onclick="deleteStock(${idx})"><i class="ti ti-trash" style="font-size:12px"></i></button>
        </div>
      </div>
      <div class="card-body">${priceFields}</div>
      <div class="memo-section">
        <div class="memo-tabs">
          <button class="memo-tab active" onclick="switchMemoTab(this,'reason','mt${idx}')">매수근거</button>
          <button class="memo-tab" onclick="switchMemoTab(this,'risk','mt${idx}')">리스크</button>
          ${isSold?`<button class="memo-tab" onclick="switchMemoTab(this,'review','mt${idx}')">반성</button>`:''}
        </div>
        <div id="mt${idx}_reason" class="memo-content visible">
          ${s.reason?`<div style="font-size:12px;color:var(--color-text-primary);line-height:1.6">${s.reason}</div>`:'<div style="font-size:12px;color:var(--color-text-secondary)">매수 근거를 입력해두세요</div>'}
          ${s.news?`<div style="font-size:11px;color:var(--color-text-secondary);margin-top:3px"><i class="ti ti-news" style="font-size:11px;vertical-align:-1px"></i> ${s.news}</div>`:''}
          ${s.sentiment?`<div style="font-size:13px;margin-top:4px">${s.sentiment} <span style="font-size:11px;color:var(--color-text-secondary)">매수 당시 심리</span></div>`:''}
        </div>
        <div id="mt${idx}_risk" class="memo-content">
          <div style="display:flex;flex-wrap:wrap;gap:12px">
            <div><div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:2px">포트폴리오 비중</div>
              <div style="font-size:14px;font-weight:500;color:var(--color-text-primary)">${weight.toFixed(1)}%</div>
              <div class="weight-bar"><div class="weight-fill" style="width:${Math.min(weight*2,100)}%"></div></div>
            </div>
            ${s.target&&s.buy?`<div><div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:2px">목표 수익률</div><div style="font-size:14px;font-weight:500;color:var(--color-text-success)">+${((s.target-s.buy)/s.buy*100).toFixed(1)}%</div></div>`:''}
            ${s.stop&&s.buy?`<div><div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:2px">최대 손실</div><div style="font-size:14px;font-weight:500;color:var(--color-text-danger)">${((s.stop-s.buy)/s.buy*100).toFixed(1)}%</div></div>`:''}
            ${s.stop&&s.target?`<div><div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:2px">리스크/리워드</div><div style="font-size:14px;font-weight:500">${Math.abs((s.target-s.buy)/(s.stop-s.buy)).toFixed(1)}R</div></div>`:''}
          </div>
        </div>
        ${isSold?`<div id="mt${idx}_review" class="memo-content">${s.review?`<div style="font-size:12px;color:var(--color-text-primary);line-height:1.6">${s.review}</div>`:'<div style="font-size:12px;color:var(--color-text-secondary)">반성 메모를 입력해두세요</div>'}</div>`:''}
      </div>
    </div>`;
  }).join('');
}

function switchMemoTab(btn,key,prefix){
  btn.closest('.memo-section').querySelectorAll('.memo-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  btn.closest('.memo-section').querySelectorAll('.memo-content').forEach(c=>c.classList.remove('visible'));
  document.getElementById(prefix+'_'+key)?.classList.add('visible');
}
function setFilter(f,btn){filter=f;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));btn.classList.add('active');renderList();}
function setSentiment(btn){document.querySelectorAll('#f_sentiment_wrap .sentiment-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');selectedSentiment=btn.dataset.v;}

function openModal(idx=null){
  editIdx=idx;
  document.getElementById('modalTitle').textContent=idx!=null?'종목 수정':'종목 추가';
  if(idx!=null){
    const s=stocks[idx];
    ['name','ticker','qty','buy','buydate','current','target','stop','sell','selldate','reason','news','review'].forEach(f=>{const el=document.getElementById('f_'+f);if(el)el.value=s[f]||'';});
    document.getElementById('f_sector').value=s.sector||'기타';
    selectedSentiment=s.sentiment||'😐';
  }else{
    ['name','ticker','qty','buy','buydate','current','target','stop','sell','selldate','reason','news','review'].forEach(f=>{const el=document.getElementById('f_'+f);if(el)el.value='';});
    selectedSentiment='😐';
  }
  document.querySelectorAll('#f_sentiment_wrap .sentiment-btn').forEach(b=>b.classList.toggle('active',b.dataset.v===selectedSentiment));
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}

function saveStock(){
  const name=document.getElementById('f_name').value.trim();
  const qty=parseFloat(document.getElementById('f_qty').value);
  const buy=parseFloat(document.getElementById('f_buy').value);
  const buydate=document.getElementById('f_buydate').value;
  if(!name||!qty||!buy||!buydate){alert('종목명, 주수, 매수 단가, 매수일은 필수입니다');return;}
  const stock={
    id:editIdx!=null?stocks[editIdx].id:Date.now(),
    name,sector:document.getElementById('f_sector').value,
    ticker:document.getElementById('f_ticker').value.trim(),
    qty,buy,buydate,
    current:parseFloat(document.getElementById('f_current').value)||null,
    target:parseFloat(document.getElementById('f_target').value)||null,
    stop:parseFloat(document.getElementById('f_stop').value)||null,
    sell:parseFloat(document.getElementById('f_sell').value)||null,
    selldate:document.getElementById('f_selldate').value||null,
    reason:document.getElementById('f_reason').value.trim(),
    news:document.getElementById('f_news').value.trim(),
    review:document.getElementById('f_review').value.trim(),
    sentiment:selectedSentiment,
    priceUpdated:editIdx!=null?stocks[editIdx].priceUpdated:null,
  };
  if(editIdx!=null)stocks[editIdx]=stock;else stocks.push(stock);
  save();closeModal();render();
}
function deleteStock(idx){if(confirm('삭제하시겠습니까?')){stocks.splice(idx,1);save();render();}}

function exportCSV(){
  const headers=['종목명','업종','티커','주수','매수단가','총투자금','매수일','현재가','목표가','손절가','매도단가','매도일','매수이유','참고뉴스','심리','반성메모','손익','수익률(%)'];
  const rows=stocks.map(s=>{
    const{gain,pct}=calcProfit(s);
    return[s.name,s.sector,s.ticker||'',s.qty,s.buy,s.buy*s.qty,s.buydate,s.current||'',s.target||'',s.stop||'',s.sell||'',s.selldate||'',`"${(s.reason||'').replace(/"/g,'""')}"`,`"${(s.news||'').replace(/"/g,'""')}"`,s.sentiment||'',`"${(s.review||'').replace(/"/g,'""')}"`,gain!=null?Math.round(gain):'',pct!=null?pct.toFixed(2):''].join(',');
  });
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+[headers.join(','),...rows].join('\n')],{type:'text/csv;charset=utf-8;'}));
  a.download='주식트래커_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}

function render(){renderSummary();renderAlerts();renderRisk();renderPie();renderList();}
load();render();
</script>
