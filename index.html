<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>주식 투자 트래커</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f9f9f9; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    const APP_KEY = `여기에_APP_KEY_입력`;PS2pchjYwiJhRrVfkd7QI2ea3BzT7UyY6LPc
    const APP_SECRET = `여기에_APP_SECRET_입력`;4kR3I3EG+7HDFPuTg06mEYQqIrfMpgdCoBYzO8gos7cY1Nn+pm76Rt/c/C4XjrGPZ7AH7sAKMU7ivCW3/wmVQE3B6cAnSiqMA7cBWC1eE6aUQT7PC4bS04urwGop2cToNENqbT4K1a7fXuHf0+yyw1kmO+UQN/kh0Xy30SEHY1+u89vdLtU=

    const fmt = (n) => Number(n).toLocaleString("ko-KR");
    const pct = (n) => (n >= 0 ? "+" : "") + n.toFixed(2) + "%";
    const profitColor = (n) => n > 0 ? "#1D9E75" : n < 0 ? "#E24B4A" : "#888780";
    const CARD_COLORS = [
      { bg: "#E6F1FB", border: "#378ADD", accent: "#185FA5", text: "#0C447C" },
      { bg: "#E1F5EE", border: "#1D9E75", accent: "#0F6E56", text: "#085041" },
      { bg: "#FAEEDA", border: "#BA7517", accent: "#854F0B", text: "#633806" },
      { bg: "#EEEDFE", border: "#7F77DD", accent: "#534AB7", text: "#3C3489" },
      { bg: "#FBEAF0", border: "#D4537E", accent: "#993556", text: "#72243E" },
      { bg: "#EAF3DE", border: "#639922", accent: "#3B6D11", text: "#27500A" },
    ];
    const PIE_COLORS = ["#378ADD","#1D9E75","#BA7517","#7F77DD","#D4537E","#639922"];
    const emptyForm = { name: "", qty: "", buyDate: "", buyPrice: "", sellDate: "", sellPrice: "" };
    const STORAGE_KEY = "stock_tracker_data";
    const defaultStocks = [
      { id: 1, name: "삼성전자", ticker: "005930", qty: 10, buyDate: "2024-01-15", buyPrice: 72000, sellDate: "2024-06-20", sellPrice: 82000, currentPrice: null },
      { id: 2, name: "카카오", ticker: "035720", qty: 5, buyDate: "2024-03-01", buyPrice: 48000, sellDate: "", sellPrice: "", currentPrice: null },
      { id: 3, name: "NAVER", ticker: "035420", qty: 3, buyDate: "2024-02-10", buyPrice: 195000, sellDate: "2024-08-05", sellPrice: 175000, currentPrice: null },
    ];

    function BarChart({ data }) {
      if (!data.length) return <div style={{ textAlign: "center", color: "#aaa", fontSize: 12, padding: "30px 0" }}>매도 완료 종목이 없어요</div>;
      const max = Math.max(...data.map(d => Math.abs(d.rate)));
      return (
        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          {data.map((d, i) => (
            <div key={i}>
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, marginBottom: 3 }}>
                <span style={{ color: "#555" }}>{d.name}</span>
                <span style={{ color: profitColor(d.rate), fontWeight: 500 }}>{pct(d.rate)}</span>
              </div>
              <div style={{ background: "#f0f0f0", borderRadius: 4, height: 14, overflow: "hidden" }}>
                <div style={{ width: (Math.abs(d.rate) / max * 100) + "%", background: d.rate >= 0 ? "#1D9E75" : "#E24B4A", height: "100%", borderRadius: 4 }} />
              </div>
            </div>
          ))}
        </div>
      );
    }

    function PieChart({ data, total }) {
      if (!total) return null;
      let cumulative = 0;
      const radius = 60, cx = 80, cy = 75;
      const slices = data.map((d, i) => {
        const p = d.value / total;
        const startAngle = cumulative * 2 * Math.PI - Math.PI / 2;
        cumulative += p;
        const endAngle = cumulative * 2 * Math.PI - Math.PI / 2;
        const x1 = cx + radius * Math.cos(startAngle);
        const y1 = cy + radius * Math.sin(startAngle);
        const x2 = cx + radius * Math.cos(endAngle);
        const y2 = cy + radius * Math.sin(endAngle);
        const large = p > 0.5 ? 1 : 0;
        return { path: `M ${cx} ${cy} L ${x1} ${y1} A ${radius} ${radius} 0 ${large} 1 ${x2} ${y2} Z`, color: PIE_COLORS[i % PIE_COLORS.length], name: d.name, p };
      });
      return (
        <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
          <svg width="160" height="150">
            {slices.map((s, i) => <path key={i} d={s.path} fill={s.color} stroke="#fff" strokeWidth="2" />)}
          </svg>
          <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            {slices.map((s, i) => (
              <div key={i} style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 11 }}>
                <div style={{ width: 10, height: 10, borderRadius: 2, background: s.color, flexShrink: 0 }} />
                <span style={{ color: "#555" }}>{s.name} {(s.p * 100).toFixed(1)}%</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function App() {
      const [stocks, setStocks] = useState(() => {
        try {
          const saved = localStorage.getItem(STORAGE_KEY);
          return saved ? JSON.parse(saved) : defaultStocks;
        } catch { return defaultStocks; }
      });
      const [form, setForm] = useState(emptyForm);
      const [editId, setEditId] = useState(null);
      const [showForm, setShowForm] = useState(false);
      const [tab, setTab] = useState("all");
      const [showChart, setShowChart] = useState(false);
      const [token, setToken] = useState(null);
      const [loadingPrice, setLoadingPrice] = useState(false);

      useEffect(() => {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(stocks));
      }, [stocks]);

      const getToken = async () => {
        try {
          const res = await fetch("https://openapi.koreainvestment.com:9443/oauth2/tokenP", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ grant_type: "client_credentials", appkey: APP_KEY, appsecret: APP_SECRET })
          });
          const data = await res.json();
          setToken(data.access_token);
          return data.access_token;
        } catch (e) {
          alert("토큰 발급 실패: " + e.message);
          return null;
        }
      };

      const fetchPrice = async (ticker, accessToken) => {
        try {
          const res = await fetch(`https://openapi.koreainvestment.com:9443/uapi/domestic-stock/v1/quotations/inquire-price?FID_COND_MRKT_DIV_CODE=J&FID_INPUT_ISCD=${ticker}`, {
            headers: {
              "content-type": "application/json",
              "authorization": `Bearer ${accessToken}`,
              "appkey": APP_KEY,
              "appsecret": APP_SECRET,
              "tr_id": "FHKST01010100",
              "custtype": "P"
            }
          });
          const data = await res.json();
          return Number(data.output?.stck_prpr) || null;
        } catch { return null; }
      };

      const handleFetchAllPrices = async () => {
        setLoadingPrice(true);
        const accessToken = token || await getToken();
        if (!accessToken) { setLoadingPrice(false); return; }
        const updated = await Promise.all(stocks.map(async s => {
          if (s.ticker) {
            const price = await fetchPrice(s.ticker, accessToken);
            return { ...s, currentPrice: price };
          }
          return s;
        }));
        setStocks(updated);
        setLoadingPrice(false);
      };

      const calc = (s) => {
        const invest = s.qty * s.buyPrice;
        const sold = s.sellDate && s.sellPrice ? s.qty * Number(s.sellPrice) : null;
        const pnl = sold !== null ? sold - invest : null;
        const rate = pnl !== null ? (pnl / invest) * 100 : null;
        const currentPnl = s.currentPrice && !s.sellDate ? s.qty * s.currentPrice - invest : null;
        const currentRate = currentPnl !== null ? (currentPnl / invest) * 100 : null;
        return { invest, pnl, rate, currentPnl, currentRate };
      };

      const summary = useMemo(() => {
        let totalInvest = 0, realizedPnl = 0;
        stocks.forEach(s => {
          const { invest, pnl } = calc(s);
          totalInvest += invest;
          if (pnl !== null) realizedPnl += pnl;
        });
        const overallRate = totalInvest > 0 ? (realizedPnl / totalInvest) * 100 : 0;
        return { totalInvest, realizedPnl, overallRate, count: stocks.length };
      }, [stocks]);

      const barData = stocks.filter(s => s.sellDate && s.sellPrice).map(s => {
        const { rate } = calc(s);
        return { name: s.name, rate };
      });

      const pieData = stocks.map(s => {
        const { invest } = calc(s);
        return { name: s.name, value: invest };
      });

      const filtered = stocks.filter(s =>
        tab === "holding" ? !s.sellDate : tab === "sold" ? !!s.sellDate : true
      );

      const handleSubmit = () => {
        if (!form.name || !form.qty || !form.buyDate || !form.buyPrice) return;
        const entry = { ...form, qty: Number(form.qty), buyPrice: Number(form.buyPrice), sellPrice: form.sellPrice ? Number(form.sellPrice) : "", currentPrice: null };
        if (editId !== null) {
          setStocks(stocks.map(s => s.id === editId ? { ...s, ...entry } : s));
          setEditId(null);
        } else {
          setStocks([...stocks, { id: Date.now(), ...entry }]);
        }
        setForm(emptyForm); setShowForm(false);
      };

      const handleEdit = (s) => {
        setForm({ name: s.name, ticker: s.ticker || "", qty: s.qty, buyDate: s.buyDate, buyPrice: s.buyPrice, sellDate: s.sellDate || "", sellPrice: s.sellPrice || "" });
        setEditId(s.id); setShowForm(true);
      };

      return (
        <div style={{ padding: "1.5rem 1rem", maxWidth: 700, margin: "0 auto" }}>
          <div style={{ borderBottom: "2px solid #378ADD", paddingBottom: 12, marginBottom: "1.5rem", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <div style={{ width: 10, height: 32, borderRadius: 4, background: "linear-gradient(180deg,#378ADD,#1D9E75)" }} />
              <h2 style={{ fontSize: 20, fontWeight: 500, margin: 0 }}>주식 투자 트래커</h2>
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              <button onClick={handleFetchAllPrices} disabled={loadingPrice} style={{ padding: "5px 14px", borderRadius: 8, border: "1.5px solid #1D9E75", background: "#E1F5EE", color: "#0F6E56", fontSize: 13, cursor: "pointer" }}>
                {loadingPrice ? "조회중..." : "📈 현재가 조회"}
              </button>
              <button onClick={() => setShowChart(!showChart)} style={{ padding: "5px 14px", borderRadius: 8, border: "1.5px solid #7F77DD", background: showChart ? "#7F77DD" : "#EEEDFE", color: showChart ? "#fff" : "#534AB7", fontSize: 13, cursor: "pointer" }}>
                {showChart ? "차트 닫기" : "📊 차트"}
              </button>
            </div>
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 10, marginBottom: "1.5rem" }}>
            {[
              { label: "총 종목 수", value: summary.count + "개", bg: "#E6F1FB", border: "#378ADD", vColor: "#185FA5" },
              { label: "총 투자금액", value: "₩" + fmt(summary.totalInvest), bg: "#EEEDFE", border: "#7F77DD", vColor: "#534AB7" },
              { label: "실현 손익", value: (summary.realizedPnl >= 0 ? "+" : "") + "₩" + fmt(Math.abs(Math.round(summary.realizedPnl))), sub: pct(summary.overallRate), bg: summary.realizedPnl >= 0 ? "#E1F5EE" : "#FCEBEB", border: summary.realizedPnl >= 0 ? "#1D9E75" : "#E24B4A", vColor: profitColor(summary.realizedPnl) },
            ].map((m, i) => (
              <div key={i} style={{ background: m.bg, borderRadius: 10, padding: "12px 14px", border: "1px solid " + m.border, borderLeftWidth: 4 }}>
                <div style={{ fontSize: 11, color: "#888", marginBottom: 4 }}>{m.label}</div>
                <div style={{ fontSize: 15, fontWeight: 500, color: m.vColor }}>{m.value}</div>
                {m.sub && <div style={{ fontSize: 12, color: m.vColor, marginTop: 2 }}>{m.sub}</div>}
              </div>
            ))}
          </div>

          {showChart && (
            <div style={{ background: "#fff", border: "1px solid #eee", borderRadius: 12, padding: "1rem", marginBottom: "1.5rem" }}>
              <div style={{ fontWeight: 500, fontSize: 14, marginBottom: 16, color: "#333" }}>📊 투자 현황 차트</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
                <div>
                  <div style={{ fontSize: 12, color: "#888", marginBottom: 10, textAlign: "center" }}>종목별 수익률</div>
                  <BarChart data={barData} />
                </div>
                <div>
                  <div style={{ fontSize: 12, color: "#888", marginBottom: 10, textAlign: "center" }}>투자금액 비중</div>
                  <PieChart data={pieData} total={summary.totalInvest} />
                </div>
              </div>
            </div>
          )}

          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "1rem", borderBottom: "1px solid #eee", paddingBottom: 10 }}>
            <div style={{ display: "flex", gap: 4 }}>
              {[["all","전체"], ["holding","보유중"], ["sold","매도완료"]].map(([v, l]) => (
                <button key={v} onClick={() => setTab(v)} style={{ padding: "5px 14px", borderRadius: 20, border: tab === v ? "1.5px solid #378ADD" : "1px solid #ddd", background: tab === v ? "#E6F1FB" : "transparent", color: tab === v ? "#185FA5" : "#888", fontSize: 13, cursor: "pointer" }}>{l}</button>
              ))}
            </div>
            <button onClick={() => { setForm({...emptyForm, ticker: ""}); setEditId(null); setShowForm(!showForm); }} style={{ padding: "6px 14px", borderRadius: 8, border: "1.5px solid #378ADD", background: showForm ? "#378ADD" : "#E6F1FB", color: showForm ? "#fff" : "#185FA5", fontSize: 13, cursor: "pointer" }}>
              {showForm ? "닫기" : "+ 종목 추가"}
            </button>
          </div>

          {showForm && (
            <div style={{ background: "#EEEDFE", border: "1px solid #AFA9EC", borderRadius: 12, padding: "1rem 1.25rem", marginBottom: "1rem" }}>
              <div style={{ fontWeight: 500, fontSize: 14, marginBottom: 12, color: "#3C3489", borderBottom: "1px solid #AFA9EC", paddingBottom: 8 }}>{editId ? "종목 수정" : "새 종목 추가"}</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 12 }}>
                {[["종목명","name","text","예: 삼성전자"],["종목코드","ticker","text","예: 005930"],["매수 수량(주)","qty","number","10"],["매수 단가(₩)","buyPrice","number","70000"],["매수 날짜","buyDate","date",""],["매도 날짜(선택)","sellDate","date",""],["매도 단가(₩,선택)","sellPrice","number","80000"]].map(([label,key,type,ph]) => (
                  <div key={key}>
                    <div style={{ fontSize: 12, color: "#888", marginBottom: 4 }}>{label}</div>
                    <input type={type} placeholder={ph} value={form[key] || ""} onChange={e => setForm({...form, [key]: e.target.value})} style={{ padding: "7px 10px", borderRadius: 8, border: "1px solid #ccc", fontSize: 14, width: "100%" }} />
                  </div>
                ))}
              </div>
              <button onClick={handleSubmit} style={{ padding: "7px 20px", borderRadius: 8, border: "none", background: "#534AB7", color: "#fff", fontSize: 13, cursor: "pointer" }}>{editId ? "수정 완료" : "추가하기"}</button>
            </div>
          )}

          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {filtered.map((s, idx) => {
              const { invest, pnl, rate, currentPnl, currentRate } = calc(s);
              const hasSell = !!s.sellDate && !!s.sellPrice;
              const clr = CARD_COLORS[idx % CARD_COLORS.length];
              return (
                <div key={s.id} style={{ background: clr.bg, border: "1px solid " + clr.border, borderLeft: "5px solid " + clr.border, borderRadius: 12, padding: "14px 16px" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                      <div style={{ width: 40, height: 40, borderRadius: 10, background: clr.accent, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: 500, color: "#fff" }}>{s.name.slice(0,2)}</div>
                      <div>
                        <div style={{ fontWeight: 500, fontSize: 15, color: clr.text }}>{s.name} {s.ticker && <span style={{ fontSize: 11, color: clr.accent }}>({s.ticker})</span>}</div>
                        <div style={{ fontSize: 12, color: clr.accent, marginTop: 2 }}>{s.qty}주 · 매수 {s.buyDate}{hasSell ? " · 매도 " + s.sellDate : ""}</div>
                      </div>
                    </div>
                    <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                      <span style={{ fontSize: 11, padding: "3px 10px", borderRadius: 20, background: hasSell ? "#D3D1C7" : clr.accent, color: hasSell ? "#444" : "#fff" }}>{hasSell ? "매도완료" : "보유중"}</span>
                      <button onClick={() => handleEdit(s)} style={{ background: "none", border: "1px solid " + clr.border, borderRadius: 6, cursor: "pointer", color: clr.accent, fontSize: 12, padding: "2px 8px" }}>수정</button>
                      <button onClick={() => setStocks(stocks.filter(x => x.id !== s.id))} style={{ background: "none", border: "1px solid #E24B4A", borderRadius: 6, cursor: "pointer", color: "#E24B4A", fontSize: 12, padding: "2px 8px" }}>삭제</button>
                    </div>
                  </div>
                  <div style={{ borderTop: "1px dashed " + clr.border, margin: "12px 0" }} />
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 8 }}>
                    {[
                      { label: "매수 단가", value: "₩" + fmt(s.buyPrice) },
                      { label: "총 투자금액", value: "₩" + fmt(invest) },
                      { label: hasSell ? "매도 단가" : "현재가", value: hasSell ? "₩" + fmt(s.sellPrice) : s.currentPrice ? "₩" + fmt(s.currentPrice) : "-" },
                      { label: "손익", value: hasSell ? (pnl >= 0 ? "+" : "") + "₩" + fmt(Math.round(Math.abs(pnl))) : currentPnl !== null ? (currentPnl >= 0 ? "+" : "") + "₩" + fmt(Math.round(Math.abs(currentPnl))) : "-", sub: hasSell ? pct(rate) : currentRate !== null ? pct(currentRate) : null, pnl: hasSell ? pnl : currentPnl }
                    ].map((m, i) => (
                      <div key={i} style={{ background: "rgba(255,255,255,0.6)", borderRadius: 8, padding: "8px 10px", border: "1px solid " + clr.border }}>
                        <div style={{ fontSize: 11, color: clr.accent, marginBottom: 3 }}>{m.label}</div>
                        <div style={{ fontSize: 13, fontWeight: 500, color: m.pnl !== undefined && m.pnl !== null ? profitColor(m.pnl) : clr.text }}>{m.value}</div>
                        {m.sub && <div style={{ fontSize: 11, color: profitColor(m.pnl), marginTop: 2 }}>{m.sub}</div>}
                      </div>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
